<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人导航 - Via 书签同步</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .offline { opacity: 0.5; filter: grayscale(1); }
        .vpn-needed { border-left: 4px solid #f59e0b; } /* 橙色边框提示 */
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="container mx-auto px-4 py-8">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-gray-800">书签导航</h1>
            <p class="text-gray-500 mt-2">自动检测更新：{{ lastCheckTime }}</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <div v-for="link in bookmarks" :key="link.url" 
                 :class="['bg-white p-4 rounded-lg shadow hover:shadow-md transition', link.status === 'offline' ? 'offline' : '']">
                <a :href="link.url" target="_blank" class="block">
                    <div class="flex items-center space-x-2">
                        <img :src="'https://favicon.t.proxytok.com/?url=' + link.url" class="w-4 h-4 rounded-sm">
                        <span class="font-medium text-gray-700 truncate text-sm">{{ link.title }}</span>
                    </div>
                    <div class="mt-2 text-xs">
                        <span v-if="link.status === 'online'" class="text-green-500">● 正常</span>
                        <span v-else class="text-red-500">● 已失效</span>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue
        createApp({
            data() {
                return {
                    bookmarks: [],
                    lastCheckTime: '加载中...'
                }
            },
            mounted() {
                fetch('./data.json')
                    .then(res => res.json())
                    .then(data => {
                        this.bookmarks = data;
                        if(data.length > 0) this.lastCheckTime = data[0].check_time;
                    })
                    .catch(err => console.error('数据加载失败', err));
            }
        }).mount('#app')
    </script>
</body>
</html>
