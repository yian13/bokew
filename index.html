<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的私人书签导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .card-offline { opacity: 0.6; filter: grayscale(0.8); }
        .vpn-tag { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-7xl mx-auto px-4 py-10">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2">我的书签导航</h1>
            <p class="text-gray-500">
                最后更新：<span class="font-mono text-blue-600">{{ lastUpdate }}</span>
            </p>
        </div>

        <div v-if="loading" class="text-center py-20 text-xl text-gray-400 font-medium">
            正在加载数据，请稍候...
        </div>

        <div v-else class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <div v-for="item in bookmarks" :key="item.url" 
                 :class="['bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-lg transition-all transform hover:-translate-y-1', item.status === 'offline' ? 'card-offline' : '']">
                <a :target="item.url" :href="item.url" target="_blank" class="flex flex-col h-full">
                    <div class="flex items-center mb-3">
                        <img :src="'https://favicon.t.proxytok.com/?url=' + item.url" 
                             class="w-5 h-5 mr-2 rounded shadow-sm" 
                             onerror="this.src='https://www.google.com/s2/favicons?domain='+this.dataset.url"
                             :data-url="item.url">
                        <span class="font-bold text-gray-800 truncate text-sm flex-1">{{ item.title }}</span>
                    </div>
                    <div class="mt-auto flex items-center justify-between">
                        <span :class="item.status === 'online' ? 'text-green-500' : 'text-red-400'" class="text-[11px] font-bold">
                            {{ item.status === 'online' ? '● 正常' : '● 可能失效' }}
                        </span>
                        <span v-if="item.is_vpn" class="vpn-tag text-[10px] px-2 py-0.5 rounded-full font-bold">需代理</span>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue
        createApp({
            data() { return { bookmarks: [], loading: true, lastUpdate: '' } },
            mounted() {
                // 2. 核心修复：添加时间戳后缀，强制跳过 GitHub Pages 的缓存
                fetch('./data.json?t=' + new Date().getTime())
                    .then(res => res.json())
                    .then(data => {
                        this.bookmarks = data;
                        this.lastUpdate = data[0]?.check_time || '未知';
                        this.loading = false;
                    })
                    .catch(err => {
                        console.error("加载失败:", err);
                        this.lastUpdate = '加载失败，请检查 Actions 是否生成了 data.json';
                        this.loading = false;
                    });
            }
        }).mount('#app')
    </script>
</body>
</html>
