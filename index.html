<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六合彩公式大全</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px;
        }
        h2 { text-align: center; color: #d32f2f; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #1565c0; }
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f0f9ff; 
            border-left: 4px solid #0288d1;
            border-radius: 0 6px 6px 0;
            margin-bottom: 15px;
        }
        .title { font-weight: bold; color: #0277bd; margin-bottom: 5px; }
        .value { font-size: 18px; color: #e53935; font-weight: bold; }
        .warning {
            background: #fff8e1;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #e65100;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>六合彩公式预测器</h2>
    <input type="text" id="nums" placeholder="输入7个号码，如：25 31 06 33 30 02 27">

    <button onclick="runAll()">一键运行全部公式</button>

    <div id="output"></div>

    <div class="warning">
        ⚠️ 温馨提示：彩票开奖为独立随机事件，所有“公式”仅为娱乐模拟，无科学依据。请理性参与，切勿沉迷。
    </div>
</div>

<script>
    // 生肖映射（01=马）
    const ZODIAC = [null, "马","蛇","龙","兔","虎","牛","鼠","猪","狗","鸡","猴","羊"];
    function getZodiac(n) {
        n = ((n - 1) % 12) + 1;
        return ZODIAC[n];
    }

    // 家禽判断
    const HOME_ANIMALS = new Set(["牛","马","羊","鸡","狗","猪"]);
    function isHome(z) { return HOME_ANIMALS.has(z); }

    // 合数
    function heShu(n) {
        return String(n).split('').reduce((a,b)=>a+parseInt(b),0);
    }

    function runAll() {
        const input = document.getElementById('nums').value.trim();
        if (!input) return alert("请输入号码！");
        let arr = input.split(/[\s,，]+/).map(x=>parseInt(x)).filter(x=>!isNaN(x));
        if (arr.length < 6) return alert("至少需要6个号码！");

        const [p1, p2, p3, p4, p5, p6] = arr;
        let out = "";

        // 【娃哈哈】平一+5 生肖
        let v1 = p1 + 5;
        out += `<div class="result"><div class="title">【娃哈哈】平一 + 5 → 生肖</div><div class="value">${p1} + 5 = ${v1} → ${getZodiac(v1)}</div></div>`;

        // 【向华强】平二-2 → 家野
        let v2 = p2 - 2;
        let z2 = getZodiac(v2);
        out += `<div class="result"><div class="title">【向华强】平二 - 2 → 家野</div><div class="value">${p2} - 2 = ${v2} → ${z2}（${isHome(z2) ? '家禽' : '野兽'}）</div></div>`;

        // 【秦可卿】平二-2 → 大小合
        let hs = heShu(v2);
        let heSize = hs >= 7 ? "大合" : "小合";
        out += `<div class="result"><div class="title">【秦可卿】平二 - 2 → 大小合</div><div class="value">${p2} - 2 = ${v2}（合数${hs}）→ ${heSize}</div></div>`;

        // 【猫头鹰】平四+平五+6 → 六肖
        let v4 = p4 + p5 + 6;
        let startZ = getZodiac(v4);
        const ALL_Z = ["鼠","猪","狗","鸡","猴","羊","马","蛇","龙","兔","虎","牛"];
        let idx = ALL_Z.indexOf(startZ);
        let six = [];
        for (let i=0; i<6; i++) six.push(ALL_Z[(idx+i)%12]);
        out += `<div class="result"><div class="title">【猫头鹰】平四+平五+6 → 六肖</div><div class="value">${p4}+${p5}+6=${v4} → 起点${startZ} → [${six.join(', ')}]</div></div>`;

        // 【玄武指特】→ 预测特码
        let s = p1 + p4 + p6;
        let t = s * 3;
        let teMa = ((t - 1) % 49) + 1;
        out += `<div class="result"><div class="title">【玄武指特】→ 预测特码</div><div class="value">(${p1}+${p4}+${p6})×3 = ${t} → 特码预测：<strong>${teMa}</strong></div></div>`;

        document.getElementById('output').innerHTML = out;
    }
</script>

</body>
</html>
