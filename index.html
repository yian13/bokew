<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>通天路</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f9f9fc;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px;
        }
        h2 {
            text-align: center;
            color: #d32f2f;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #1565c0; }
        .result {
            margin-top: 15px;
            padding: 12px;
            background: #f0f9ff;
            border-left: 4px solid #0288d1;
            border-radius: 0 6px 6px 0;
            font-size: 15px;
        }
        .title {
            font-weight: bold;
            color: #0277bd;
            margin-bottom: 4px;
        }
        .value {
            color: #e53935;
            font-weight: bold;
        }
        .warning {
            background: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #e65100;
            margin-top: 25px;
            line-height: 1.5;
        }
        .section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
        }
        .note {
            font-style: italic;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>六合彩全公式模拟器（娱乐版）</h2>
    <input type="text" id="nums" placeholder="输入7个号码，如：25 31 06 33 30 02 27">

    <button onclick="runAll()">一键运行全部公式</button>

    <div id="output"></div>

    <div class="warning">
        ⚠️ <strong>重要提醒：</strong>  
        六合彩开奖为完全随机事件，所有“公式”均无科学依据，仅为民间娱乐玩法模拟。  
        长期参与彩票必亏（庄家优势 + 负期望值）。  
        请勿沉迷，切勿用于真实投注！本工具仅用于学习、编程练习或反赌教育。
    </div>
</div>

<script>
    // === 工具函数 ===
    const ZODIAC = [null, "马","蛇","龙","兔","虎","牛","鼠","猪","狗","鸡","猴","羊"];
    const ZODIAC_ORDER = ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];
    const HOME_ANIMALS = new Set(["牛","马","羊","鸡","狗","猪"]);
    const WAVE_COLOR = { // 常见波色规则（尾数）
        0: "红", 1: "蓝", 2: "绿", 3: "红", 4: "蓝",
        5: "红", 6: "蓝", 7: "绿", 8: "红", 9: "蓝"
    };

    function getZodiac(n) {
        if (n <= 0) n = ((n % 12) + 12) % 12 || 12;
        else n = ((n - 1) % 12) + 1;
        return ZODIAC[n];
    }

    function isHome(z) { return HOME_ANIMALS.has(z); }

    function heShu(n) {
        return String(Math.abs(n)).split('').reduce((a,b)=>a+parseInt(b),0);
    }

    function tail(n) { return Math.abs(n) % 10; }

    function waveColor(n) { return WAVE_COLOR[tail(n)] || "未知"; }

    function sixZodiacs(startZ) {
        let idx = ZODIAC_ORDER.indexOf(startZ);
        if (idx === -1) return ["?"];
        let res = [];
        for (let i = 0; i < 6; i++) {
            res.push(ZODIAC_ORDER[(idx + i) % 12]);
        }
        return res;
    }

    // === 主执行函数 ===
    function runAll() {
        const input = document.getElementById('nums').value.trim();
        if (!input) return alert("请输入号码！");
        let arr = input.split(/[\s,，]+/).map(x => parseInt(x)).filter(x => !isNaN(x) && x >= 1 && x <= 49);
        if (arr.length < 6) return alert("至少需要6个有效号码（1-49）！");

        const [p1, p2, p3, p4, p5, p6, teMaActual] = [...arr, null];
        const allPos = [p1, p2, p3, p4, p5, p6];
        const sum6 = allPos.reduce((a,b)=>a+b,0);
        const span = Math.max(...allPos) - Math.min(...allPos);

        let out = "";

        // ===== 第一部分：经典娱乐公式 =====
        out += `<div class="section"><strong>【经典娱乐公式】</strong></div>`;

        // 【娃哈哈】平一+5 → 生肖
        let v1 = p1 + 5;
        out += `<div class="result"><div class="title">【娃哈哈】平一 + 5 → 生肖</div><div class="value">${p1} + 5 = ${v1} → ${getZodiac(v1)}</div></div>`;

        // 【向华强】平二-2 → 家野
        let v2 = p2 - 2;
        let z2 = getZodiac(v2);
        out += `<div class="result"><div class="title">【向华强】平二 - 2 → 家野</div><div class="value">${p2} - 2 = ${v2} → ${z2}（${isHome(z2) ? '家禽' : '野兽'}）</div></div>`;

        // 【秦可卿】平二-2 → 大小合
        let hs = heShu(v2);
        let heSize = hs >= 7 ? "大合" : "小合";
        out += `<div class="result"><div class="title">【秦可卿】平二 - 2 → 大小合</div><div class="value">${p2} - 2 = ${v2}（合数${hs}）→ ${heSize}</div></div>`;

        // 【猫头鹰】平四+平五+6 → 六肖
        let v4 = p4 + p5 + 6;
        let startZ = getZodiac(v4);
        out += `<div class="result"><div class="title">【猫头鹰】平四+平五+6 → 六肖</div><div class="value">${p4}+${p5}+6=${v4} → 起点${startZ} → [${sixZodiacs(startZ).join(', ')}]</div></div>`;

        // 【玄武指特】→ 预测特码
        let s = p1 + p4 + p6;
        let t = s * 3;
        let teMaPred = ((t - 1) % 49) + 1;
        out += `<div class="result"><div class="title">【玄武指特】→ 预测特码</div><div class="value">(${p1}+${p4}+${p6})×3 = ${t} → 特码预测：<strong>${teMaPred}</strong></div></div>`;

        // ===== 第二部分：尾数类公式 =====
        out += `<div class="section"><strong>【尾数类公式】</strong></div>`;

        // 尾数公式1：特码尾 = (平一尾 + 平六尾) % 10
        let tail1 = (tail(p1) + tail(p6)) % 10;
        out += `<div class="result"><div class="title">【尾数1】(平一尾 + 平六尾) % 10</div><div class="value">(${tail(p1)} + ${tail(p6)}) % 10 = ${tail1} → 可能特码：${[1,2,3,4,5].map(i=>(i*10+tail1)%50||50).filter(x=>x<=49).join(', ')}</div></div>`;

        // 尾数公式2：和值尾 = 下期特码尾
        let sumTail = tail(sum6);
        out += `<div class="result"><div class="title">【尾数2】6正码和值尾 → 特码尾</div><div class="value">和值=${sum6} → 尾${sumTail} → 可能特码：${[0,1,2,3,4].map(i=>i*10+sumTail).filter(x=>x>=1&&x<=49).join(', ')}</div></div>`;

        // ===== 第三部分：生肖类公式 =====
        out += `<div class="section"><strong>【生肖类公式】</strong></div>`;

        // 生肖定位：平一 → 生肖
        out += `<div class="result"><div class="title">【生肖定位】平一 → 生肖</div><div class="value">平一=${p1} → ${getZodiac(p1)}</div></div>`;

        // 六肖连环：(平五 - 平二) → 起点生肖
        let diff = p5 - p2;
        let zDiff = getZodiac(diff);
        out += `<div class="result"><div class="title">【六肖连环】(平五 - 平二) → 六肖</div><div class="value">${p5} - ${p2} = ${diff} → 起点${zDiff} → [${sixZodiacs(zDiff).join(', ')}]</div></div>`;

        // ===== 第四部分：波色类公式 =====
        out += `<div class="section"><strong>【波色类公式】</strong></div>`;

        // 波色轮转：上期特码波色 + 平三 → 下期波色（简化版）
        let lastWave = teMaActual ? waveColor(teMaActual) : waveColor(p6); // 若未输特码，用平六代替
        let nextWaveNum = (['红','蓝','绿'].indexOf(lastWave) + tail(p3)) % 3;
        let nextWave = ['红','蓝','绿'][nextWaveNum];
        out += `<div class="result"><div class="title">【波色轮转】上期波色 + 平三尾 → 下期波色</div><div class="value">上期波色=${lastWave} + 平三尾${tail(p3)} → 下期波色：<strong>${nextWave}</strong></div></div>`;

        // ===== 第五部分：和值与跨度 =====
        out += `<div class="section"><strong>【和值与跨度类】</strong></div>`;

        // 和值尾（已做，略）
        // 跨度定单双
        let teMaParity = (span % 2 === 0) ? "双" : "单";
        out += `<div class="result"><div
