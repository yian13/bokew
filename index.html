<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>六合彩公式计算器 - 平一+5</title>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #d32f2f;
    }
    .input-group {
      margin: 20px 0;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 18px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #1565c0;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background-color: #e8f5e9;
      border-left: 4px solid #4caf50;
      font-size: 18px;
      display: none;
    }
    .error {
      background-color: #ffebee;
      border-left-color: #f44336;
      color: #c62828;
    }
  </style>
</head>
<body>
  <h1>六合彩公式计算器</h1>
  <p style="text-align: center;">公式：平一 + 5 → 查生肖</p>

  <div class="input-group">
    <label for="numbers">请输入7个开奖号码（用空格或逗号分隔）：</label>
    <input type="text" id="numbers" placeholder="例如：25 31 06 33 30 02 27" />
  </div>

  <button onclick="calculate()">计算生肖</button>

  <div id="result"></div>

  <script>
    // 标准六合彩生肖对应表（01=鸡）
    const shengxiaoMap = {
      '01': '鸡', '02': '狗', '03': '猪',
      '04': '鼠', '05': '牛', '06': '虎',
      '07': '兔', '08': '龙', '09': '蛇',
      '10': '马', '11': '羊', '12': '猴',
      '13': '鸡', '14': '狗', '15': '猪',
      '16': '鼠', '17': '牛', '18': '虎',
      '19': '兔', '20': '龙', '21': '蛇',
      '22': '马', '23': '羊', '24': '猴',
      '25': '鸡', '26': '狗', '27': '猪',
      '28': '鼠', '29': '牛', '30': '虎', // ⚠️ 标准是“虎”
      '31': '兔', '32': '龙', '33': '蛇',
      '34': '马', '35': '羊', '36': '猴',
      '37': '鸡', '38': '狗', '39': '猪',
      '40': '鼠', '41': '牛', '42': '虎',
      '43': '兔', '44': '龙', '45': '蛇',
      '46': '马', '47': '羊', '48': '猴',
      '49': '鸡'
    };

    // 如果您坚持 30 对应“牛”，请取消下一行的注释（覆盖上面的值）
    // shengxiaoMap['30'] = '牛';

    function calculate() {
      const input = document.getElementById('numbers').value.trim();
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.className = '';

      if (!input) {
        resultDiv.textContent = '请输入号码！';
        resultDiv.className = 'error';
        return;
      }

      // 支持空格、逗号、中文逗号分隔
      const numbers = input.split(/[\s,，]+/).filter(n => n !== '');

      if (numbers.length < 1) {
        resultDiv.textContent = '未检测到有效号码！';
        resultDiv.className = 'error';
        return;
      }

      // 取第一个号码作为“平一”
      let pingYi = numbers[0].padStart(2, '0'); // 补零，如 "2" → "02"

      // 检查是否为有效数字
      const numValue = parseInt(pingYi, 10);
      if (isNaN(numValue) || numValue < 1 || numValue > 49) {
        resultDiv.textContent = `“平一”号码 ${pingYi} 无效！应为 01-49。`;
        resultDiv.className = 'error';
        return;
      }

      // 公式：平一 + 5
      let resultNum = numValue + 5;
      if (resultNum > 49) {
        resultNum = resultNum - 49; // 循环回绕（可选，也可直接报错）
      }
      const resultStr = String(resultNum).padStart(2, '0');

      // 查找生肖
      const shengxiao = shengxiaoMap[resultStr];

      if (shengxiao) {
        resultDiv.innerHTML = `
          平一号码：<strong>${pingYi}</strong><br>
          平一 + 5 = <strong>${resultStr}</strong><br>
          对应生肖：<strong style="color:#d32f2f;">${shengxiao}</strong>
        `;
      } else {
        resultDiv.textContent = `无法找到数字 ${resultStr} 对应的生肖！`;
        resultDiv.className = 'error';
      }
    }

    // 支持回车键计算
    document.getElementById('numbers').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        calculate();
      }
    });
  </script>
</body>
</html>
