<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>蓝奏云直链获取器</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        #log { background: #f8f9fa; padding: 15px; border-radius: 4px; margin-top: 20px; white-space: pre-wrap; word-break: break-all; font-size: 14px; border: 1px solid #ddd; }
        .success { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <h2>蓝奏云直链解析</h2>
    <input type="text" id="urlInput" placeholder="请输入蓝奏云链接 (如 https://lanzouv.com/xxx)">
    <button onclick="startParse()">立即解析</button>
    <div id="log">等待操作...</div>

    <script>
        const PROXY = "https://cors-anywhere.azm.workers.dev/"; // 这是一个演示用的跨域代理

        async function fetchWithProxy(url, options = {}) {
            return fetch(PROXY + url, options);
        }

        // 对应 Python 中的 calc_acw
        function calcAcw(arg1) {
            const mask = "3000176000856006061501533003690027800375";
            const pos = [15, 35, 29, 24, 33, 16, 1, 38, 10, 9, 19, 31, 40, 27, 22, 23, 25, 13, 6, 11, 39, 18, 20, 8, 14, 21, 32, 26, 2, 30, 7, 4, 17, 5, 3, 28, 34, 37, 12, 36];
            let arg2 = new Array(40).fill("");
            for (let i = 0; i < 40; i++) {
                let idx = pos[i] - 1;
                if (idx < arg1.length) arg2[i] = arg1[idx];
            }
            arg2 = arg2.join("");
            let res = "";
            for (let i = 0; i < 40; i += 2) {
                let val = parseInt(arg2.substring(i, i + 2), 16) ^ parseInt(mask.substring(i, i + 2), 16);
                res += val.toString(16).padStart(2, '0');
            }
            return res;
        }

        async function startParse() {
            const targetUrl = document.getElementById('urlInput').value;
            const logBox = document.getElementById('log');
            if (!targetUrl) return alert("请输入链接");

            logBox.innerText = "[1] 正在访问分享页...\n";
            
            try {
                let response = await fetchWithProxy(targetUrl);
                let text = await response.text();
                let cookies = "";

                // 处理 acw_sc__v2 绕过
                if (text.includes("arg1='")) {
                    logBox.innerText += "[*] 检测到 WAF，正在绕过...\n";
                    const arg1 = text.match(/arg1\s*=\s*'([^']+)'/)[1];
                    const acwV2 = calcAcw(arg1);
                    // 注意：前端 fetch 很难手动完美控制所有 Cookie，这里依赖代理的 Header 传递
                    response = await fetchWithProxy(targetUrl, {
                        headers: { 'X-Cors-Set-Cookie': `acw_sc__v2=${acwV2}` }
                    });
                    text = await response.text();
                }

                // 提取 iframe
                const iframeMatch = text.match(/["'](\/fn\?[a-zA-Z0-9_\-=]+)["']/);
                if (!iframeMatch) throw new Error("未找到 iframe，请检查链接或更换代理。");
                const iframeUrl = new URL(iframeMatch[1], targetUrl).href;
                logBox.innerText += `[2] 提取到 iframe: ${iframeUrl}\n`;

                // 提取参数
                const r2 = await fetchWithProxy(iframeUrl);
                const text2 = await r2.text();
                const ajaxData = text2.match(/var\s+ajaxdata\s*=\s*['"](.+?)['"];/)?.[1];
                const fid = text2.match(/(?:var\s+fid\s*=\s*|file=)(\d{6,})/)?.[1];
                const wpSign = text2.match(/var\s+wp_sign\s*=\s*['"](.+?)[' text2];/)?.[1];

                if (!ajaxData || !fid) throw new Error("关键参数提取失败。");

                logBox.innerText += `[3] 正在请求直链接口...\n`;
                const postUrl = `${new URL(iframeUrl).origin}/ajaxm.php?file=${fid}`;
                
                const formData = new URLSearchParams();
                formData.append('action', 'downprocess');
                formData.append('signs', ajaxData);
                formData.append('sign', wpSign || "");
                formData.append('kd', 1);

                const res = await fetchWithProxy(postUrl, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });

                const data = await res.json();
                if (data.zt === 1) {
                    const finalLink = `${data.dom}/file/${data.url}`.replace('/file//', '/file/');
                    logBox.innerHTML += `<hr><span class="success">✅ 解析成功！</span>\n<a href="${finalLink}" target="_blank">点击下载地址</a>\n\n${finalLink}`;
                } else {
                    logBox.innerText += `❌ 接口错误: ${JSON.stringify(data)}`;
                }

            } catch (err) {
                logBox.innerText += `\n❌ 出错了: ${err.message}`;
            }
        }
    </script>
</body>
</html>
