<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>六合彩全公式 · 自动开奖预测</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f9f9f9;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #c62f2f;
            margin-bottom: 15px;
        }
        .status {
            text-align: center;
            color: #e65100;
            font-weight: bold;
            margin: 10px 0;
            line-height: 1.4;
        }
        .result {
            margin: 12px 0;
            padding: 10px;
            background: #f0f9ff;
            border-left: 4px solid #0288d1;
            border-radius: 0 6px 6px 0;
            font-size: 14px;
        }
        .title { font-weight: bold; color: #0277bd; }
        .value { color: #d32f2f; font-weight: bold; }
        .actual {
            background: #e8f5e9 !important;
            border-left-color: #388e3c !important;
        }
        .section-title {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
            font-weight: bold;
            color: #5d4037;
        }
        .warning {
            background: #fff8e1;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #e65100;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>六合彩全公式 · 自动开奖预测</h2>
    <div class="status" id="status">🔄 正在获取最新开奖数据...</div>
    <div id="output"></div>

    <div class="warning">
        ⚠️ 数据来源：<a href="https://macaumarksix.com" target="_blank">macaumarksix.com</a><br>
        • 所有“公式”仅为民间娱乐模拟，**无科学依据**。<br>
        • 彩票为独立随机事件，长期参与必亏，请理性对待。
    </div>
</div>

<script>
// ====== 配置 ======
const API_URL = "https://macaumarksix.com/api/macaujc3.com";

// 生肖与波色规则
const ZODIAC_LIST = ["鼠","牛","虎","兔","龙","蛇","马","羊","猴","鸡","狗","猪"];
const COLOR_BY_TAIL = {0:'红',1:'蓝',2:'绿',3:'红',4:'蓝',5:'红',6:'蓝',7:'绿',8:'红',9:'蓝'};
const HOME_ANIMALS = new Set(["牛","马","羊","鸡","狗","猪"]);

// 工具函数
const getZodiac = (num) => ZODIAC_LIST[((num - 1) % 12 + 12) % 12];
const isHome = (z) => HOME_ANIMALS.has(z);
const getTail = (n) => n % 10;
const getColor = (n) => COLOR_BY_TAIL[getTail(n)];
const heShu = (n) => String(n).split('').reduce((a,b)=>a+parseInt(b),0);
const mod49 = (x) => ((x - 1) % 49) + 1;

// ====== 主函数 ======
async function fetchAndRun() {
    const statusEl = document.getElementById('status');
    try {
        statusEl.textContent = "📡 请求开奖数据...";
        const res = await fetch(FULL_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        if (!data || !Array.isArray(data) || !data[0]?.data?.[0]) {
            throw new Error("数据格式异常");
        }

        const latest = data[0].data[0];
        const numbers = latest.openCode.split(',').map(x => parseInt(x.trim()));
        const [p1, p2, p3, p4, p5, p6, actualTeMa] = numbers;
        const nums6 = [p1, p2, p3, p4, p5, p6];
        const sum6 = nums6.reduce((a,b)=>a+b,0);
        const min6 = Math.min(...nums6);
        const max6 = Math.max(...nums6);
        const span = max6 - min6;

        statusEl.innerHTML = `✅ 期号 ${latest.expect}（${latest.openTime}）<br>开奖号码：<strong>${latest.openCode}</strong>`;

        let out = "";

        // ========== 第一部分：经典人物公式 ==========
        out += `<div class="section-title">📌 经典人物公式（预测下期）</div>`;

        // 【娃哈哈】平一+5 → 生肖
        let v_wahaha = p1 + 5;
        out += `<div class="result"><div class="title">【娃哈哈】平一 + 5 → 生肖</div><div class="value">${p1} + 5 = ${v_wahaha} → ${getZodiac(v_wahaha)}</div></div>`;

        // 【向华强】平二-2 → 家野
        let v_xiang = p2 - 2;
        let z_xiang = getZodiac(v_xiang);
        out += `<div class="result"><div class="title">【向华强】平二 - 2 → 家野</div><div class="value">${p2} - 2 = ${v_xiang} → ${z_xiang}（${isHome(z_xiang) ? '家禽' : '野兽'}）</div></div>`;

        // 【秦可卿】平二-2 → 大小合
        let hs_qin = heShu(v_xiang);
        let heSize = hs_qin >= 7 ? "大合" : "小合";
        out += `<div class="result"><div class="title">【秦可卿】平二 - 2 → 大小合</div><div class="value">${p2} - 2 = ${v_xiang}（合数${hs_qin}）→ ${heSize}</div></div>`;

        // 【猫头鹰】平四+平五+6 → 六肖
        let v_mao = p4 + p5 + 6;
        let startZ = getZodiac(v_mao);
        let idx = ZODIAC_LIST.indexOf(startZ);
        let sixZ = Array.from({length:6}, (_,i) => ZODIAC_LIST[(idx+i)%12]);
        out += `<div class="result"><div class="title">【猫头鹰】平四+平五+6 → 六肖</div><div class="value">${p4}+${p5}+6=${v_mao} → 起点${startZ} → [${sixZ.join(', ')}]</div></div>`;

        // 【玄武指特】预测特码
        let s_xuanwu = p1 + p4 + p6;
        let t_xuanwu = s_xuanwu * 3;
        let predTeMa = mod49(t_xuanwu);
        out += `<div class="result"><div class="title">【玄武指特】→ 预测下期特码</div><div class="value">(${p1}+${p4}+${p6})×3 = ${t_xuanwu} → <strong>${predTeMa}</strong></div></div>`;

        // ========== 第二部分：尾数与和值 ==========
        out += `<div class="section-title">🔢 尾数与和值类</div>`;

        let tailPred1 = (getTail(p1) + getTail(p6)) % 10;
        out += `<div class="result"><div class="title">【尾数和】平一尾+平六尾 → 特码尾</div><div class="value">${getTail(p1)} + ${getTail(p6)} = ${getTail(p1)+getTail(p6)} → 尾 ${tailPred1}</div></div>`;

        let sumTail = getTail(sum6);
        out += `<div class="result"><div class="title">【和值尾】6码总和尾 → 特码尾</div><div class="value">总和 ${sum6} → 尾 ${sumTail}</div></div>`;

        // ========== 第三部分：生肖与六肖 ==========
        out += `<div class="section-title">🐉 生肖与六肖</div>`;

        let diff = p5 - p2;
        let z_diff = getZodiac(diff);
        let idx2 = ZODIAC_LIST.indexOf(z_diff);
        let sixZ2 = Array.from({length:6}, (_,i) => ZODIAC_LIST[(idx2+i)%12]);
        out += `<div class="result"><div class="title">【六肖连环】平五 - 平二 → 六肖</div><div class="value">${p5} - ${p2} = ${diff} → 起点${z_diff} → [${sixZ2.join(', ')}]</div></div>`;

        // ========== 第四部分：波色与单双 ==========
        out += `<div class="section-title">🔴🔵🟢 波色与单双</div>`;

        let colorRef = getColor(p6);
        out += `<div class="result"><div class="title">【波色参考】平六波色</div><div class="value">平六 ${p6} → ${colorRef}色</div></div>`;

        let danShuang = (span % 2 === 1) ? "单" : "双";
        out += `<div class="result"><div class="title">【跨度定单双】跨度 = 最大-最小</div><div class="value">跨度 ${span}（${span%2===1?'奇':'偶'}）→ 特码可能为<strong>${danShuang}</strong></div></div>`;

        // ========== 第五部分：本期实际结果（用于对比） ==========
        out += `<div class="section-title">🎯 本期实际特码（供验证）</div>`;
        out += `<div class="result actual">
            <div class="title">本期特码：${actualTeMa}</div>
            <div class="value">
                生肖：${getZodiac(actualTeMa)} | 
                波色：${getColor(actualTeMa)} | 
                ${actualTeMa % 2 === 1 ? '单' : '双'} | 
                合数：${heShu(actualTeMa)}
            </div>
        </div>`;

        // ========== 第六部分：玄学提示 ==========
        out += `<div class="section-title">🔮 玄学提醒</div>`;
        out += `<div class="result"><div class="value">• “冷号必出”是赌徒谬误！每个号码概率恒为 1/49。<br>• 节日、谐音、五行等与开奖无关，纯属心理暗示。</div></div>`;

        document.getElementById('output').innerHTML = out;

    } catch (err) {
        console.error("Error:", err);
        statusEl.innerHTML = `❌ 获取失败：${err.message}<br>请刷新重试，或检查网络。`;
    }
}

// 页面加载时自动执行
window.addEventListener('load', fetchAndRun);
</script>

</body>
</html>
